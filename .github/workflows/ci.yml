name: CI

on:
  push:
    branches: [ master, yj ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"

      - name: Set up Gradle 4.10.3
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 4.10.3

      - name: Build (without tests)
        run: gradle clean assemble

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: build/libs/**

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"

      - name: Set up Gradle 4.10.3
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 4.10.3

      - name: Start required services
        run: |
          docker compose up -d
          sleep 30

      - name: Start application in background
        run: |
          nohup gradle run > app.log 2>&1 &
          sleep 45

      - name: Run unit/integration tests
        run: gradle test

      - name: Generate code coverage report
        if: always()
        run: gradle jacocoTestReport

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/**

      - name: Upload code coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: build/reports/jacoco/test/**

      - name: Upload application log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-log
          path: app.log

      - name: Show container status
        if: always()
        run: docker ps

      - name: Show container logs
        if: always()
        run: docker compose logs

      - name: Stop services
        if: always()
        run: docker compose down

  deployment:
    runs-on: ubuntu-latest
    needs: [build, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t sampletalkcicd .

      - name: Run application using Docker Compose
        run: |
          docker compose up -d
          sleep 30

      - name: Show docker-compose file
        run: cat docker-compose.yml

      - name: Show running containers
        run: docker ps

      - name: Wait for application
        run: sleep 20

      - name: Verify application is running
        run: curl http://localhost:8080/healthCheck

      - name: Stop containers
        if: always()
        run: docker compose down
